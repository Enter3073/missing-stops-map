<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Остановки Белгорода</title>
  <style>
    :root {
      --green: #1a7f37;
      --orange: #d97706;
      --red: #cf222e;
      --border: #d0d7de;
      --muted: #57606a;
      --bg: #f6f8fa;
      --mobile-map-height: 48dvh;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; color: #111827; }
    button, input, select { font: inherit; }
    .app { display: grid; grid-template-columns: minmax(360px, 430px) 1fr; height: 100vh; min-height: 520px; }
    .sidebar { min-height: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg); }
    .header { flex: 0 0 auto; padding: 16px; background: #fff; border-bottom: 1px solid var(--border); }
    .header h1 { margin: 0 0 12px; font-size: 22px; line-height: 1.15; }
    .detail-panel { flex: 0 0 auto; padding: 14px 16px; background: #fff; border-bottom: 1px solid var(--border); }
    .detail-panel[hidden] { display: none; }
    .detail-card { border: 1px solid var(--border); border-left-width: 6px; border-radius: 7px; padding: 12px; background: #fff; }
    .detail-card.green { border-left-color: var(--green); }
    .detail-card.orange { border-left-color: var(--orange); }
    .detail-card.red { border-left-color: var(--red); }
    .detail-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .detail-title { font-weight: 700; font-size: 16px; line-height: 1.25; overflow-wrap: anywhere; }
    .detail-close { border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 24px; line-height: 1; padding: 0 2px; }
    .detail-meta { color: var(--muted); font-size: 13px; line-height: 1.35; }
    .detail-link { display: inline-block; margin-top: 8px; color: #0969da; font-size: 13px; }
    .detail-comment { margin-top: 8px; font-size: 14px; line-height: 1.35; overflow-wrap: anywhere; }
    .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; font-size: 14px; }
    .stat { min-width: 0; padding: 9px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; }
    .stat b { display: block; font-size: 20px; line-height: 1; margin-bottom: 3px; }
    .controls { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .search-row { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .control { width: 100%; min-height: 38px; padding: 7px 9px; border: 1px solid var(--border); border-radius: 6px; background: #fff; }
    .filter-box { border: 1px solid var(--border); border-radius: 6px; background: #fff; }
    .filter-box summary { min-height: 38px; padding: 8px 10px; cursor: pointer; user-select: none; }
    .filter-options { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; padding: 0 10px 10px; }
    .filter-option { display: inline-flex; align-items: center; gap: 7px; min-width: 0; color: #1f2937; font-size: 13px; }
    .filter-option input { width: 16px; height: 16px; margin: 0; }
    .tech-toggle { margin-top: 8px; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: #8c959f; user-select: none; }
    .tech-toggle input { width: 12px; height: 12px; }
    .list { flex: 1 1 auto; min-height: 0; overflow: auto; padding: 8px; }
    .empty { padding: 16px; color: var(--muted); }
    .stop-item {
      width: 100%;
      text-align: left;
      display: block;
      margin: 0 0 7px;
      padding: 10px 11px;
      border: 1px solid var(--border);
      border-left-width: 6px;
      border-radius: 7px;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(27,31,36,.03);
    }
    .stop-item:hover { border-color: #8c959f; }
    .stop-title { display: flex; align-items: baseline; gap: 7px; min-width: 0; }
    .stop-number { flex: 0 0 auto; color: var(--muted); font-weight: 700; font-size: 12px; }
    .stop-name { font-weight: 700; font-size: 15px; line-height: 1.25; overflow-wrap: anywhere; }
    .stop-meta { margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.3; }
    .comment { margin-top: 7px; font-size: 13px; line-height: 1.3; color: #1f2937; overflow-wrap: anywhere; }
    .tech-detail { display: none; margin-top: 7px; color: var(--muted); font-size: 12px; line-height: 1.35; }
    body.tech-on .tech-detail { display: block; }
    .stop-item.green { border-left-color: var(--green); }
    .stop-item.orange { border-left-color: var(--orange); }
    .stop-item.red { border-left-color: var(--red); }
    #map { height: 100%; min-height: 0; }
    .legend {
      position: absolute;
      z-index: 10;
      bottom: 18px;
      right: 18px;
      background: #fff;
      padding: 10px 12px;
      border-radius: 7px;
      box-shadow: 0 2px 14px rgba(0,0,0,.18);
      font-size: 14px;
      line-height: 1.35;
    }
    .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 6px; }
    .dot.green { background: var(--green); }
    .dot.orange { background: var(--orange); }
    .dot.red { background: var(--red); }
    a { color: #0969da; }

    @media (max-width: 900px) {
      html, body { height: auto; min-height: 100%; overflow-x: hidden; }
      .app { display: block; height: auto; min-height: 100dvh; padding-top: var(--mobile-map-height); }
      #map {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        height: var(--mobile-map-height);
        min-height: 300px;
      }
      .sidebar { min-height: 0; display: block; border-right: 0; border-top: 1px solid var(--border); }
      .detail-panel { padding: 12px; }
      .header { padding: 12px; }
      .header h1 { font-size: 19px; margin-bottom: 10px; }
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; font-size: 12px; }
      .stat { padding: 7px 6px; }
      .stat b { font-size: 17px; }
      .search-row { grid-template-columns: 1fr 150px; }
      .filter-options { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .list { overflow: visible; padding: 7px; }
      .stop-item { padding: 9px 10px; margin-bottom: 6px; }
      .legend { display: none; }
    }

    @media (max-width: 520px) {
      :root { --mobile-map-height: 47dvh; }
      #map { height: var(--mobile-map-height); min-height: 280px; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .search-row { grid-template-columns: 1fr; }
      .filter-options { grid-template-columns: 1fr; gap: 7px; }
    }
  </style>
</head>

              <label class="filter-option"><input class="filter-color" type="checkbox" value="red" checked><span><span class="dot red"></span>не хватает</span></label>
            </div>
          </details>
        </div>
        <label class="tech-toggle"><input id="techToggle" type="checkbox"> технические комментарии</label>
      </div>
      <div id="stopList" class="list"></div>
    </aside>
    <main id="map"></main>
    <div class="legend">
      <div><span class="dot green"></span>исправно</div>
      <div><span class="dot orange"></span>проблема</div>
      <div><span class="dot red"></span>не хватает</div>
    </div>
  </div>

    function escapeText(value) {

        '"': '&quot;',
        "'": '&#039;'

    function displayStatus(point) {

        return !query || searchableText(point).includes(query);
      });
      filtered.sort((a, b) => {
        if (mode === 'problem') {
          const colorDiff = colorPriority[a['Цвет']] - colorPriority[b['Цвет']];
          if (colorDiff) return colorDiff;
        }
        const nameDiff = String(a['Название остановки']).localeCompare(String(b['Название остановки']), 'ru-RU');
        if (nameDiff) return nameDiff;
        const numberDiff = tableNumber(a) - tableNumber(b);
        if (numberDiff) return numberDiff;
        return Number(a['Номер экземпляра']) - Number(b['Номер экземпляра']);
      });
      return filtered;
    }

    function detailContent(point) {

      const time = [point['Дата'], point['Время']].filter(Boolean).join(' ');

            ${point['Адрес из таблицы'] ? `Адрес из таблицы: ${escapeText(point['Адрес из таблицы'])}<br>` : ''}
            Координаты: ${escapeText(point['Источник координат'])}; ${escapeText(point['Статус координат'])}
          </div>`
        : '';
      return `
        <div class="detail-card ${escapeText(point['Цвет'])}">
          <div class="detail-head">

    function showDetail(point, scrollToPanel = false) {
      const panel = document.getElementById('detailPanel');
      panel.innerHTML = detailContent(point);
      panel.hidden = false;
      const closeButton = document.getElementById('detailClose');
      if (closeButton) closeButton.addEventListener('click', () => {

    function isMobileViewport() {

    function openPoint(item, zoom = 17) {
      if (!item || !map) return;
      const lat = Number(item.point.lat);
      const lon = Number(item.point.lon);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;
      map.setCenter([lat, lon], zoom, { duration: 250 });
      if (isMobileViewport()) {
        if (item.placemark.balloon) item.placemark.balloon.close();
        showDetail(item.point, true);
        window.setTimeout(() => {
          if (item.placemark.balloon) item.placemark.balloon.close();
        }, 0);
      } else {
        item.placemark.balloon.open();
      }
    }

    function updateMarkerVisibility(visiblePoints) {
      if (!map) return;
      const visibleIds = new Set(visiblePoints.map(point => point.__id));
      placemarks.forEach(item => {
        const shouldShow = visibleIds.has(item.point.__id);
        if (shouldShow && !item.visible) {
          map.geoObjects.add(item.placemark);
          item.visible = true;
        }
        if (!shouldShow && item.visible) {
          map.geoObjects.remove(item.placemark);
          item.visible = false;
        }
      });
    }

        placemark.events.add('click', event => {
          if (!isMobileViewport()) return;
          if (event && event.stopPropagation) event.stopPropagation();
          const item = placemarks.find(entry => entry.point.__id === point.__id);
          openPoint(item, map.getZoom());
        });
        placemarks.push({ point, placemark, visible: true });
        map.geoObjects.add(placemark);
      });

      document.getElementById('techToggle').addEventListener('change', event => {
        document.body.classList.toggle('tech-on', event.target.checked);
        placemarks.forEach(item => {
          item.placemark.properties.set('balloonContent', balloonContent(item.point));
        });
        renderList();
      });
      renderList();
    }

    document.getElementById('searchInput').addEventListener('input', renderList);
    document.getElementById('sortSelect').addEventListener('change', renderList);
    document.querySelectorAll('.filter-color').forEach(input => input.addEventListener('change', renderList));
    renderList();

    function loadYandexMaps() {
      const script = document.createElement('script');
      script.src = `https://api-maps.yandex.ru/2.1/?apikey=${encodeURIComponent(YANDEX_MAPS_API_KEY)}&lang=ru_RU`;
      script.onload = () => ymaps.ready(initMap);
      script.onerror = () => {
        document.getElementById('map').innerHTML = '<div style="padding:24px;font:16px Arial">Не удалось загрузить Яндекс.Карты JS API.</div>';
      };
      document.head.appendChild(script);
    }

    loadYandexMaps();
  </script>
</body>
</html>
