<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Остановки Белгорода</title>
  <style>
    :root {
      --green: #1a7f37;
      --orange: #d97706;
      --red: #cf222e;
      --border: #d0d7de;
      --muted: #57606a;
      --bg: #f6f8fa;
      --mobile-map-height: 48dvh;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; color: #111827; }
    button, input, select { font: inherit; }
    .app { display: grid; grid-template-columns: minmax(360px, 430px) 1fr; height: 100vh; min-height: 520px; }
    .sidebar { min-height: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg); }
    .header { flex: 0 0 auto; padding: 16px; background: #fff; border-bottom: 1px solid var(--border); }
    .header h1 { margin: 0 0 12px; font-size: 22px; line-height: 1.15; }
    .detail-panel { flex: 0 0 auto; padding: 14px 16px; background: #fff; border-bottom: 1px solid var(--border); }
    .detail-panel[hidden] { display: none; }
    .detail-card { border: 1px solid var(--border); border-left-width: 6px; border-radius: 7px; padding: 12px; background: #fff; }
    .detail-card.green { border-left-color: var(--green); }
    .detail-card.orange { border-left-color: var(--orange); }
    .detail-card.red { border-left-color: var(--red); }
    .detail-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .detail-title { font-weight: 700; font-size: 16px; line-height: 1.25; overflow-wrap: anywhere; }
    .detail-close { border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 24px; line-height: 1; padding: 0 2px; }
    .detail-meta { color: var(--muted); font-size: 13px; line-height: 1.35; }
    .detail-link { display: inline-block; margin-top: 8px; color: #0969da; font-size: 13px; }
    .detail-comment { margin-top: 8px; font-size: 14px; line-height: 1.35; overflow-wrap: anywhere; }
    .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; font-size: 14px; }
    .stat { min-width: 0; padding: 9px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; }
    .stat b { display: block; font-size: 20px; line-height: 1; margin-bottom: 3px; }
    .controls { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .search-row { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .control { width: 100%; min-height: 38px; padding: 7px 9px; border: 1px solid var(--border); border-radius: 6px; background: #fff; }
    .filter-box { border: 1px solid var(--border); border-radius: 6px; background: #fff; }
    .filter-box summary { min-height: 38px; padding: 8px 10px; cursor: pointer; user-select: none; }
    .filter-options { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; padding: 0 10px 10px; }
    .filter-option { display: inline-flex; align-items: center; gap: 7px; min-width: 0; color: #1f2937; font-size: 13px; }
    .filter-option input { width: 16px; height: 16px; margin: 0; }
    .tech-toggle { margin-top: 8px; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: #8c959f; user-select: none; }
    .tech-toggle input { width: 12px; height: 12px; }
    .list { flex: 1 1 auto; min-height: 0; overflow: auto; padding: 8px; }
    .empty { padding: 16px; color: var(--muted); }
    .stop-item {
      width: 100%;
      text-align: left;
      display: block;
      margin: 0 0 7px;
      padding: 10px 11px;
      border: 1px solid var(--border);
      border-left-width: 6px;
      border-radius: 7px;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(27,31,36,.03);
    }
    .stop-item:hover { border-color: #8c959f; }
    .stop-title { display: flex; align-items: baseline; gap: 7px; min-width: 0; }
    .stop-number { flex: 0 0 auto; color: var(--muted); font-weight: 700; font-size: 12px; }
    .stop-name { font-weight: 700; font-size: 15px; line-height: 1.25; overflow-wrap: anywhere; }
    .stop-meta { margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.3; }
    .comment { margin-top: 7px; font-size: 13px; line-height: 1.3; color: #1f2937; overflow-wrap: anywhere; }
    .tech-detail { display: none; margin-top: 7px; color: var(--muted); font-size: 12px; line-height: 1.35; }
    body.tech-on .tech-detail { display: block; }
    .stop-item.green { border-left-color: var(--green); }
    .stop-item.orange { border-left-color: var(--orange); }
    .stop-item.red { border-left-color: var(--red); }
    #map { height: 100%; min-height: 0; }
    .legend {
      position: absolute;
      z-index: 10;
      bottom: 18px;
      right: 18px;
      background: #fff;
      padding: 10px 12px;
      border-radius: 7px;
      box-shadow: 0 2px 14px rgba(0,0,0,.18);
      font-size: 14px;
      line-height: 1.35;
    }
    .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 6px; }
    .dot.green { background: var(--green); }
    .dot.orange { background: var(--orange); }
    .dot.red { background: var(--red); }
    a { color: #0969da; }

    @media (max-width: 900px) {
      html, body { height: auto; min-height: 100%; overflow-x: hidden; }
      .app { display: block; height: auto; min-height: 100dvh; padding-top: var(--mobile-map-height); }
      #map {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        height: var(--mobile-map-height);
        min-height: 300px;
      }
      .sidebar { min-height: 0; display: block; border-right: 0; border-top: 1px solid var(--border); }
      .detail-panel { padding: 12px; }
      .header { padding: 12px; }
      .header h1 { font-size: 19px; margin-bottom: 10px; }
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; font-size: 12px; }
      .stat { padding: 7px 6px; }
      .stat b { font-size: 17px; }
      .search-row { grid-template-columns: 1fr 150px; }
      .filter-options { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .list { overflow: visible; padding: 7px; }
      .stop-item { padding: 9px 10px; margin-bottom: 6px; }
      .legend { display: none; }
    }

    @media (max-width: 520px) {
      :root { --mobile-map-height: 47dvh; }
      #map { height: var(--mobile-map-height); min-height: 280px; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .search-row { grid-template-columns: 1fr; }
      .filter-options { grid-template-columns: 1fr; gap: 7px; }
    }
  </style>
</head>

  <div class="app">
    <aside class="sidebar">
      <section id="detailPanel" class="detail-panel" hidden></section>
      <div class="header">
        <h1>Остановки Белгорода</h1>
        <div class="stats">
          <div class="stat"><b id="statGreen">82</b>исправно</div>
          <div class="stat"><b id="statOrange">31</b>проблемы</div>
          <div class="stat"><b id="statRed">0</b>не хватает</div>
          <div class="stat"><b id="statTotal">113</b>всего</div>
        </div>
        <div class="controls">
          <div class="search-row">
            <input id="searchInput" class="control" type="search" placeholder="Поиск по остановкам">
            <select id="sortSelect" class="control" aria-label="Сортировка">
              <option value="alpha">По алфавиту</option>
              <option value="problem">По проблемам</option>
            </select>
          </div>
          <details class="filter-box">
            <summary>Фильтры</summary>
            <div class="filter-options">
              <label class="filter-option"><input class="filter-color" type="checkbox" value="green" checked><span><span class="dot green"></span>исправно</span></label>
              <label class="filter-option"><input class="filter-color" type="checkbox" value="orange" checked><span><span class="dot orange"></span>проблема</span></label>
              <label class="filter-option"><input class="filter-color" type="checkbox" value="red" checked><span><span class="dot red"></span>не хватает</span></label>
            </div>
          </details>
        </div>
        <div id="sheetSyncStatus" class="tech-detail" style="margin-top:8px">Данные Google Таблицы: загрузка...</div>
        <label class="tech-toggle"><input id="techToggle" type="checkbox"> технические комментарии</label>
      </div>
      <div id="stopList" class="list"></div>
    </aside>
    <main id="map"></main>
    <div class="legend">
      <div><span class="dot green"></span>исправно</div>
      <div><span class="dot orange"></span>проблема</div>
      <div><span class="dot red"></span>не хватает</div>
    </div>
  </div>

          continue;
        }
        if (char === ',') {
          row.push(value);
          value = '';
          continue;
        }
        if (char === '
') {
          row.push(value);
          rows.push(row);
          row = [];
          value = '';
          continue;
        }
        if (char !== '') value += char;
      }
      if (value || row.length) {
        row.push(value);
        rows.push(row);
      }
      if (!rows.length) return [];
      const headers = rows[0].map(header => header.trim());
      return rows.slice(1)
        .filter(items => items.some(item => String(item).trim()))
        .map(items => Object.fromEntries(headers.map((header, index) => [header, items[index] ?? ''])));
    }

    function hasProblemComment(comment) {
      const text = String(comment || '').toLocaleLowerCase('ru-RU').replace(/\s+/g, ' ').trim();
      if (!text) return false;
      const problemPatterns = [
        /не\s+работ/,
        /неисправ/,
        /отсутств/,
        /разбит/,
        /слом/,
        /повреж/,
        /не\s+горит/,
        /ничего\s+не\s+горит/,
        /нет\s+питан/,
        /обесточ/,
        /крыш/,
        /телевизор/,
        /экран/,
        /монитор/,
        /подсвет/,
        /частич/,
        /гор(ит|ел|ела|ело)\s+постоян/
      ];
      return problemPatterns.some(pattern => pattern.test(text));
    }

    function colorFromSheetRow(point, sheetRow) {
      if (point['Статус наличия'] === 'не хватает' || point['Цвет'] === 'red') return 'red';
      return hasProblemComment(sheetRow['Комментарий']) ? 'orange' : 'green';
    }

    function updateStats() {
      document.getElementById('statGreen').textContent = POINTS.filter(point => point['Цвет'] === 'green').length;
      document.getElementById('statOrange').textContent = POINTS.filter(point => point['Цвет'] === 'orange').length;
      document.getElementById('statRed').textContent = POINTS.filter(point => point['Цвет'] === 'red').length;
      document.getElementById('statTotal').textContent = POINTS.length;
    }

    function setSheetSyncStatus(text) {
      const target = document.getElementById('sheetSyncStatus');
      if (target) target.textContent = text;
    }

    function applySheetRows(sheetRows) {
      const byNumber = new Map();
      sheetRows.forEach(row => {
        const number = String(row['№'] || '').trim();
        if (number) byNumber.set(number, row);
      });
      let changed = 0;
      POINTS.forEach(point => {
        const number = String(point['№ в таблице'] || '').trim();
        const sheetRow = byNumber.get(number);
        if (!sheetRow) return;
        point['Комментарий'] = sheetRow['Комментарий'] || '';
        point['Дата'] = sheetRow['Дата'] || point['Дата'] || '';
        point['Время'] = sheetRow['Время'] || point['Время'] || '';
        point['Адрес из таблицы'] = sheetRow['Адрес из базы'] || point['Адрес из таблицы'] || '';
        point['Название остановки'] = sheetRow['Название остановки'] || point['Название остановки'];
        point['Цвет'] = colorFromSheetRow(point, sheetRow);
        changed += 1;
      });
      placemarks.forEach(item => {
        item.placemark.properties.set({
          hintContent: item.point['Название остановки'],
          iconCaption: item.point['Название остановки'],
          balloonContent: balloonContent(item.point)
        });
        item.placemark.options.set('preset', presetFor(item.point));
      });
      updateStats();
      renderList();
      const stamp = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      setSheetSyncStatus(`Данные Google Таблицы обновлены: ${stamp}; строк сопоставлено: ${changed}`);
    }

    async function refreshFromGoogleSheet() {
      try {
        const url = `${GOOGLE_SHEET_CSV_URL}&cacheBust=${Date.now()}`;
        const response = await fetch(url, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        applySheetRows(parseCsv(text));
      } catch (error) {
        setSheetSyncStatus(`Google Таблица недоступна, показаны встроенные данные: ${error.message}`);
      }
    }

    function displayStatus(point) {
      if (point['Цвет'] === 'red') return 'не хватает';
      if (point['Цвет'] === 'orange') return 'проблема';
      return 'исправно';
    }

    function tableNumber(point) {
      const value = Number(point['№ в таблице']);
      return Number.isFinite(value) ? value : 999999;
    }

    function searchableText(point) {
      return [
        point['Название остановки'],
        point['Комментарий'],
        point['№ в таблице'],
        point['Сторона/адрес экземпляра'],
        point['Адрес из таблицы']
      ].join(' ').toLocaleLowerCase('ru-RU');
    }

    function sortedFilteredPoints() {
      const query = document.getElementById('searchInput').value.trim().toLocaleLowerCase('ru-RU');
      const mode = document.getElementById('sortSelect').value;
      const enabledColors = new Set(
        [...document.querySelectorAll('.filter-color:checked')].map(input => input.value)
      );
      const filtered = POINTS.filter(point => {
        if (!enabledColors.has(point['Цвет'])) return false;
        return !query || searchableText(point).includes(query);
      });
      filtered.sort((a, b) => {
        if (mode === 'problem') {
          const colorDiff = colorPriority[a['Цвет']] - colorPriority[b['Цвет']];
          if (colorDiff) return colorDiff;
        }
        const nameDiff = String(a['Название остановки']).localeCompare(String(b['Название остановки']), 'ru-RU');
        if (nameDiff) return nameDiff;
        const numberDiff = tableNumber(a) - tableNumber(b);
        if (numberDiff) return numberDiff;
        return Number(a['Номер экземпляра']) - Number(b['Номер экземпляра']);
      });
      return filtered;
    }

    function listItem(point) {
      const number = point['№ в таблице'] ? `№${escapeText(point['№ в таблице'])}` : `экз. ${escapeText(point['Номер экземпляра'])}`;
      const comment = point['Комментарий']
        ? `<div class="comment">${escapeText(point['Комментарий'])}</div>`
        : '';
      const time = [point['Дата'], point['Время']].filter(Boolean).join(' ');
      return `
        <button class="stop-item ${escapeText(point['Цвет'])}" data-id="${point.__id}">
          <div class="stop-title">
            <span class="stop-number">${number}</span>
            <span class="stop-name">${escapeText(point['Название остановки'])}</span>
          </div>
          <div class="stop-meta">${escapeText(displayStatus(point))}</div>
          ${comment}
          <div class="tech-detail">
            ${time ? `Таблица: ${escapeText(time)}<br>` : ''}
            ${point['Сторона/адрес экземпляра'] ? `Сторона: ${escapeText(point['Сторона/адрес экземпляра'])}<br>` : ''}
            ${point['Адрес из таблицы'] ? `Адрес из таблицы: ${escapeText(point['Адрес из таблицы'])}<br>` : ''}
            Координаты: ${escapeText(point['Источник координат'])}; ${escapeText(point['Статус координат'])}
          </div>
        </button>
      `;
    }

    function detailContent(point) {
      const number = point['№ в таблице'] ? `№${escapeText(point['№ в таблице'])}` : `экз. ${escapeText(point['Номер экземпляра'])}`;
      const time = [point['Дата'], point['Время']].filter(Boolean).join(' ');
      const comment = point['Комментарий']
        ? `<div class="detail-comment">${escapeText(point['Комментарий'])}</div>`
        : '';
      const tech = document.body.classList.contains('tech-on')
        ? `<div class="tech-detail" style="display:block">
            ${time ? `Таблица: ${escapeText(time)}<br>` : ''}
            ${point['Сторона/адрес экземпляра'] ? `Сторона: ${escapeText(point['Сторона/адрес экземпляра'])}<br>` : ''}
            ${point['Адрес из таблицы'] ? `Адрес из таблицы: ${escapeText(point['Адрес из таблицы'])}<br>` : ''}
            Координаты: ${escapeText(point['Источник координат'])}; ${escapeText(point['Статус координат'])}
          </div>`
        : '';
      return `
        <div class="detail-card ${escapeText(point['Цвет'])}">
          <div class="detail-head">
            <div class="detail-title">${number} ${escapeText(point['Название остановки'])}</div>
            <button id="detailClose" class="detail-close" type="button" aria-label="Закрыть">×</button>
          </div>
          <div class="detail-meta">${escapeText(displayStatus(point))}</div>
          <a class="detail-link" href="${escapeText(point['Ссылка Яндекс'])}" target="_blank" rel="noopener">Открыть на Яндекс.Карте</a>
          ${comment}
          ${tech}
        </div>
      `;
    }

    function showDetail(point, scrollToPanel = false) {
      const panel = document.getElementById('detailPanel');
      panel.innerHTML = detailContent(point);
      panel.hidden = false;
      const closeButton = document.getElementById('detailClose');
      if (closeButton) closeButton.addEventListener('click', () => {
        panel.hidden = true;
        panel.innerHTML = '';
      });
      if (scrollToPanel) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function isMobileViewport() {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    function openPoint(item, zoom = 17) {
      if (!item || !map) return;
      const lat = Number(item.point.lat);
      const lon = Number(item.point.lon);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;
      map.setCenter([lat, lon], zoom, { duration: 250 });
      if (isMobileViewport()) {
        if (item.placemark.balloon) item.placemark.balloon.close();
        showDetail(item.point, true);
        window.setTimeout(() => {
          if (item.placemark.balloon) item.placemark.balloon.close();
        }, 0);
      } else {
        item.placemark.balloon.open();
      }
    }

    function updateMarkerVisibility(visiblePoints) {
      if (!map) return;
      const visibleIds = new Set(visiblePoints.map(point => point.__id));
      placemarks.forEach(item => {
        const shouldShow = visibleIds.has(item.point.__id);
        if (shouldShow && !item.visible) {
          map.geoObjects.add(item.placemark);
          item.visible = true;
        }
        if (!shouldShow && item.visible) {
          map.geoObjects.remove(item.placemark);
          item.visible = false;
        }
      });
    }

    function renderList() {
      const points = sortedFilteredPoints();
      const list = document.getElementById('stopList');
      list.innerHTML = points.length ? points.map(listItem).join('') : '<div class="empty">Ничего не найдено</div>';
      list.querySelectorAll('.stop-item').forEach(button => {
        button.addEventListener('click', () => {
          const id = Number(button.dataset.id);
          const found = placemarks.find(item => item.point.__id === id);
          openPoint(found, 17);
        });
      });
      updateMarkerVisibility(points);
    }

    function balloonContent(point) {
      const number = point['№ в таблице'] ? `№${escapeText(point['№ в таблице'])} ` : '';
      const comment = point['Комментарий']
        ? `<br><br>${escapeText(point['Комментарий'])}`
        : '';
      const basic = `
        <strong>${number}${escapeText(point['Название остановки'])}</strong><br>
        ${escapeText(displayStatus(point))}<br><br>
        <a href="${escapeText(point['Ссылка Яндекс'])}" target="_blank" rel="noopener">Открыть на Яндекс.Карте</a>
        ${comment}
      `;
      if (!document.body.classList.contains('tech-on')) return basic;
      const time = [point['Дата'], point['Время']].filter(Boolean).join(' ');
      return basic + `
        <hr>
        ${time ? `Таблица: ${escapeText(time)}<br>` : ''}
        В базе: ${escapeText(point['Количество в базе'])}, найдено: ${escapeText(point['Найдено'])}, не хватает: ${escapeText(point['Не хватает'])}<br>
        Сторона: ${escapeText(point['Сторона/адрес экземпляра'])}<br>
        Адреса/стороны: ${escapeText(point['Адреса/стороны'])}<br>
        Адрес из таблицы: ${escapeText(point['Адрес из таблицы'])}<br>
        Координаты: ${escapeText(point['Источник координат'])}<br>
        Статус координат: ${escapeText(point['Статус координат'])}
      `;
    }

    function presetFor(point) {
      if (point['Цвет'] === 'red') return 'islands#redCircleDotIcon';
      if (point['Цвет'] === 'orange') return 'islands#orangeCircleDotIcon';
      return 'islands#greenCircleDotIcon';
    }

    function initMap() {
      map = new ymaps.Map('map', {
        center: [50.59, 36.575],
        zoom: 11,
        controls: ['zoomControl', 'typeSelector', 'fullscreenControl']
      });

      POINTS.forEach(point => {
        const lat = Number(point.lat);
        const lon = Number(point.lon);
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;
        const placemark = new ymaps.Placemark([lat, lon], {
          hintContent: point['Название остановки'],
          iconCaption: point['Название остановки'],
          balloonContent: balloonContent(point)
        }, {
          preset: presetFor(point)
        });
        placemark.events.add('click', event => {
          if (!isMobileViewport()) return;
          if (event && event.stopPropagation) event.stopPropagation();
          const item = placemarks.find(entry => entry.point.__id === point.__id);
          openPoint(item, map.getZoom());
        });
        placemarks.push({ point, placemark, visible: true });
        map.geoObjects.add(placemark);
      });

      document.getElementById('techToggle').addEventListener('change', event => {
        document.body.classList.toggle('tech-on', event.target.checked);
        placemarks.forEach(item => {
          item.placemark.properties.set('balloonContent', balloonContent(item.point));
        });
        renderList();
      });
      renderList();
      refreshFromGoogleSheet();
      window.setInterval(refreshFromGoogleSheet, GOOGLE_SHEET_REFRESH_MS);
    }

    document.getElementById('searchInput').addEventListener('input', renderList);
    document.getElementById('sortSelect').addEventListener('change', renderList);
    document.querySelectorAll('.filter-color').forEach(input => input.addEventListener('change', renderList));
    renderList();

    function loadYandexMaps() {
      const script = document.createElement('script');
      script.src = `https://api-maps.yandex.ru/2.1/?apikey=${encodeURIComponent(YANDEX_MAPS_API_KEY)}&lang=ru_RU`;
      script.onload = () => ymaps.ready(initMap);
      script.onerror = () => {
        document.getElementById('map').innerHTML = '<div style="padding:24px;font:16px Arial">Не удалось загрузить Яндекс.Карты JS API.</div>';
      };
      document.head.appendChild(script);
    }

    loadYandexMaps();
  </script>
</body>
